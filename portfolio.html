<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishore Kalash Intro</title>
    <style>
        /* Reset and Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Deep black to match the video */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }

        /* Container to hold video and text */
        .intro-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Video Styling */
        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video fills the screen */
            z-index: 1;
        }

        /* Overlay to make text pop against the video */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Slight darkening */
            z-index: 2;
        }

        /* Name Text Styling */
        #name-text {
            position: relative;
            z-index: 3;
            color: #ffffff;
            font-size: 4rem; /* Adjust based on preference */
            font-weight: 300; /* Sleek, thin font */
            letter-spacing: 8px;
            text-transform: uppercase;
            
            /* Initial State (Hidden) */
            opacity: 0; 
            transform: scale(0.9);
            
            /* The glow effect mimicking headlights */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 
                         0 0 20px rgba(255, 255, 255, 0.3);
            
            /* Smooth transitions for appearing and disappearing */
            transition: opacity 1.5s ease-in-out, transform 3s ease-out;
        }

        /* Classes triggered by JavaScript */
        .show-text {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        .hide-text {
            opacity: 0 !important;
            transform: scale(1.05) !important;
        }

        /* Responsive sizing for mobile devices */
        @media (max-width: 768px) {
            #name-text {
                font-size: 2rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="intro-container">
        <video id="bg-video" autoplay muted playsinline>
            <source src="/src/assets/bg.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <div class="overlay"></div>
        
        <h1 id="name-text">Kishore Kalash</h1>
    </div>

    <script>
        // Grab the video and text elements
        const video = document.getElementById('bg-video');
        const nameText = document.getElementById('name-text');

        // Listen for the video's time updates
        video.addEventListener('timeupdate', () => {
            const time = video.currentTime;

            // At 1.5 seconds (when headlights glow), show the text
            if (time >= 1.5 && time < 4.8) {
                nameText.classList.add('show-text');
                nameText.classList.remove('hide-text');
            } 
            // At 4.8 seconds (as headlights start to turn off), hide the text
            else if (time >= 4.8) {
                nameText.classList.remove('show-text');
                nameText.classList.add('hide-text');
            }
        });

        // Optional: Reset animation if the video loops or ends
        video.addEventListener('ended', () => {
            nameText.classList.remove('show-text');
            nameText.classList.remove('hide-text');
        });
    </script>

</body>
</html>
